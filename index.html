<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Photography</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    h1 {
      margin: 20px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      margin: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <h1>My Photography</h1>

  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

</body>
</html>
